name: Bootstrap Review Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run bootstrap
        run: python .github/scripts/bootstrap.py . review_data.json

      - name: Commit review_data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add review_data.json
          git diff --staged --quiet || git commit -m "chore: bootstrap review data (최근 1개월 문제 등록)"
          git push

name: Process Review Feedback

on:
  repository_dispatch:
    types: [review_feedback]

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Process feedback
        env:
          PROBLEM_ID: ${{ github.event.client_payload.problem_id }}
          QUALITY: ${{ github.event.client_payload.quality }}
        run: python .github/scripts/process_feedback.py review_data.json

      - name: Commit updated review data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add review_data.json
          git diff --staged --quiet || git commit -m "review: ${{ github.event.client_payload.problem_id }} (quality: ${{ github.event.client_payload.quality }})"
          git push

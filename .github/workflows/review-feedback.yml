name: Process Review Feedback

on:
  repository_dispatch:
    types: [review_feedback]

permissions:
  contents: write

concurrency:
  group: review-feedback
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Process feedback and push
        env:
          PROBLEM_ID: ${{ github.event.client_payload.problem_id }}
          QUALITY: ${{ github.event.client_payload.quality }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            git pull --rebase origin main
            python .github/scripts/process_feedback.py review_data.json
            git add review_data.json
            git diff --staged --quiet || git commit -m "review: $PROBLEM_ID (quality: $QUALITY)"
            git push && exit 0
            echo "Push failed (attempt $i), retrying..."
            sleep 2
          done
          echo "All retries failed"
          exit 1

name: Sync to Org Repo

on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git & auth
        run: |
          git config --global user.name "hyun424"
          git config --global user.email "amorew_@naver.com"
          # https://github.com/* 로 가는 트래픽을 모두 PAT 포함 URL로 대체
          git config --global url."https://x-access-token:${{ secrets.ORG_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Add remote & push
        run: |
          git remote add org https://github.com/CodeStudyBOJ/HYUN.git
          # 인증 확인(실패 시 빨리 터뜨리기)
          git ls-remote org HEAD
          # 현재 커밋을 org의 main에 푸시
          git push org HEAD:main

name: Sync to Org Repo

on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "hyun424"
          git config --global user.email "amorew_@naver.com"

      - name: Add remote with PAT & push
        run: |
          # 항상 깨끗하게
          git remote remove org || true

          # 🔴 반드시 토큰 포함 URL로 remote 추가!
          git remote add org https://x-access-token:${{ secrets.ORG_TOKEN }}@github.com/CodeStudyBOJ/HYUN.git

          # 연결 확인(읽기는 public이면 익명도 가능)
          git ls-remote org HEAD

          # 현재 커밋을 org의 main으로 푸시
          git push org HEAD:main
